image: quay.io/podman/stable

variables:
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_VERSION: $CI_COMMIT_SHORT_SHA
  IMAGE_NAME: ${DOCKER_PRIVATE_HOST}/${CI_PROJECT_PATH}
  IS_PROD: "false"
  PROD_DEPLOYMENT_NAME: ${CI_PROJECT_NAME}-dev
  DEV_DEPLOYMENT_NAME: ${CI_PROJECT_NAME}
  # Podman build optimization
  PIP_CACHE_DIR: /cache/pip
  STORAGE_DRIVER: overlay
  BUILDAH_FORMAT: docker
  BUILDAH_ISOLATION: chroot
  GIT_DEPTH: 1 

stages:
  - build
  - deploy
default:
  tags:
    - podman


workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH == "dev_ci"
      variables:
        IS_PROD: "true"
        CI_COMMIT_TAG: "release_1.0.1"
    - if: $CI_COMMIT_TAG && '$CI_COMMIT_TAG =~ "release_"'
      variables:
        IS_PROD: "true"
    - when: never
# cache:
#   paths:
#     - node_modules/


.podman_optimized:
  before_script:
    - podman login -u $DOCKER_PRIVATE_USER -p $DOCKER_PRIVATE_PASSWORD $DOCKER_PRIVATE_HOST
    - df -h /var/lib/containers 2>/dev/null || echo "First initialization"
    - df -h /cache 2>/dev/null || echo "Cache volume not mounted"
    - mkdir -p ${CI_PROJECT_DIR}/.podman-tmp
    - export TMPDIR=${CI_PROJECT_DIR}/.podman-tmp
    - echo "STORAGE_DRIVER:${STORAGE_DRIVER}"
    - echo "BUILDAH_FORMAT:${BUILDAH_FORMAT}"
    - echo "IMAGE:${IMAGE_NAME}"
  after_script:
    # - podman system prune -af --volumes 2>/dev/null || true
    - df -h /var/lib/containers 2>/dev/null || true
    - df -h /cache 2>/dev/null || true

build-official:
  extends: .podman_optimized
  stage: build
  rules:
    - if: $IS_PROD == "true"
    - when: never
  script:
    - pwd
    # - ls -al
    - IMAGE_VERSION=$(echo "$CI_COMMIT_TAG" | cut -d'_' -f2)
    - echo $CI_COMMIT_TAG
    - echo $IS_PROD
    - echo $IMAGE_NAME:$IMAGE_VERSION
    # - echo "=== Pulling cache images ==="
    - podman pull $IMAGE_NAME:latest 2>/dev/null || echo "⚠️ No cache image"
    - podman build . -t $IMAGE_NAME:$IMAGE_VERSION --build-arg BUILD_TARGET=prod --isolation=chroot --format docker --jobs 2 --layers --network=host --pull=missing --rm
    - podman push $IMAGE_NAME:$IMAGE_VERSION
    - podman tag $IMAGE_NAME:$IMAGE_VERSION $IMAGE_NAME:latest
    - podman push $IMAGE_NAME:latest
    - podman rmi $IMAGE_NAME:$IMAGE_VERSION $IMAGE_NAME:latest --force

build-unofficial:
  extends: .podman_optimized
  stage: build
  rules:
    - if: $IS_PROD == "false"
    - when: never
  script:
    - echo $CI_COMMIT_TAG
    - echo $IS_PROD
    - echo $IMAGE_NAME:$IMAGE_VERSION ver $VERSION
    # - echo $VERSION
    # - echo "=== Pulling cache images ==="
    - podman pull $IMAGE_NAME:dev 2>/dev/null || echo "⚠️ No cache image"
    - podman build . -t $IMAGE_NAME:dev --isolation=chroot --format docker --jobs 2 --layers --network=host --pull=missing --rm
    - podman push $IMAGE_NAME:dev
    - podman rmi $IMAGE_NAME:dev --force

deploy-on-dev-k8s:
  image:
    name: bitnami/kubectl:1.26
    entrypoint: ['']
  stage: deploy
  rules:
    - if: $IS_PROD == "false"
  script:
    - echo $IMAGE_VERSION
    - kubectl --kubeconfig=$KUBE_CONFIG rollout restart deployment/${DEV_DEPLOYMENT_NAME}-dev-dpl -n ${K8S_NAMESPACE} || echo "dpl not existed"
  when: on_success